<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一键部署 - 北邮升学就业平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .deploy-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 18px 50px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            border: none;
            margin: 10px;
        }
        .deploy-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        .deploy-btn.netlify {
            background: linear-gradient(135deg, #00C7B7 0%, #009E8B 100%);
            box-shadow: 0 4px 15px rgba(0, 199, 183, 0.4);
        }
        .deploy-btn.netlify:hover {
            box-shadow: 0 8px 25px rgba(0, 199, 183, 0.6);
        }
        .steps {
            text-align: left;
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
        }
        .steps h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .steps ol {
            padding-left: 20px;
        }
        .steps li {
            color: #555;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .highlight {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 3px 10px;
            border-radius: 4px;
            font-weight: 500;
        }
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 0 8px 8px 0;
            margin-top: 20px;
            text-align: left;
        }
        .info-box p {
            color: #1565c0;
            margin: 5px 0;
            font-size: 14px;
        }
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 北邮升学就业平台</h1>
        <p class="subtitle">点击下方按钮，一键部署到云端</p>
        
        <div class="btn-group">
            <a href="https://vercel.com/new/clone?repository-url=https%3A%2F%2Fgithub.com%2Fjihuaiyuuuuuuu%2Fbyr-social-platform&env=VITE_SUPABASE_URL,VITE_SUPABASE_ANON_KEY&envDescription=Supabase%E9%85%8D%E7%BD%AE%E4%BF%A1%E6%81%AF&project-name=byr-social-platform" 
               class="deploy-btn" 
               target="_blank">
                🎯 一键部署到 Vercel
            </a>
            
            <a href="https://app.netlify.com/start/deploy?repository=https://github.com/jihuaiyuuuuuuu/byr-social-platform" 
               class="deploy-btn netlify" 
               target="_blank">
                🌐 一键部署到 Netlify
            </a>
        </div>

        <div class="steps">
            <h3>📋 部署步骤（点击按钮后自动完成）</h3>
            <ol>
                <li>点击上方按钮，跳转到部署平台</li>
                <li>使用 GitHub 账号登录授权</li>
                <li>点击 <span class="highlight">Deploy</span> 按钮</li>
                <li>等待 30-60 秒，部署完成！</li>
            </ol>
        </div>

        <div class="info-box">
            <p>✅ <strong>无需配置环境变量</strong> - 代码中已内置Supabase配置</p>
            <p>✅ <strong>自动构建部署</strong> - 平台自动安装依赖、构建、部署</p>
            <p>✅ <strong>免费HTTPS域名</strong> - 部署后自动获得SSL证书</p>
            <p>✅ <strong>全球CDN加速</strong> - 国内国外访问都很快</p>
        </div>
    </div>
</body>
</html>
